<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher – Prabha Gyan Jyoti</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; }

    .topbar {
      background: #1a6e3c;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .topbar-info h1 { font-size: 15px; }
    .topbar-info p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .topbar button {
      background: #c0392b; color: #fff; border: none;
      padding: 7px 18px; border-radius: 5px; cursor: pointer; font-size: 13px;
    }

    .content { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .card {
      background: #fff; border-radius: 10px;
      padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px;
    }
    .card h2 { font-size: 16px; color: #1a6e3c; margin-bottom: 18px; border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; }

    .filter-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
    .filter-row > div { flex: 1; min-width: 130px; }
    label { font-size: 12px; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    select, input[type="text"], input[type="number"], textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #ccc; border-radius: 6px; font-size: 13px;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: #1a6e3c; }
    textarea { min-width: 190px; min-height: 58px; resize: vertical; font-family: Arial, sans-serif; }

    .btn { padding: 9px 22px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: #1a6e3c; color: #fff; }
    .btn-load { background: #2e6da4; color: #fff; }
    .btn:hover { opacity: 0.88; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #1a6e3c; color: #fff; padding: 10px 8px; text-align: left; white-space: nowrap; }
    td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #f5fff8; }

    .marks-input {
      width: 75px; padding: 6px 8px;
      border: 1.5px solid #ccc; border-radius: 5px;
      text-align: center; font-size: 14px; font-weight: 700;
    }
    .marks-input:focus { border-color: #1a6e3c; outline: none; }
    .marks-input.saved { border-color: #27ae60; background: #f0fff4; }
    .marks-input.error { border-color: #c0392b; background: #fff5f5; }

    .msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
    .msg-success { background: #d5f5e3; color: #1e8449; }
    .msg-error { background: #fadbd8; color: #c0392b; }

    .info-box {
      background: #e8f5e9; border-left: 4px solid #1a6e3c;
      padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px;
    }
    .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    .dot-green { background: #27ae60; }
    .dot-orange { background: #e67e22; }

    #loading { text-align: center; padding: 30px; color: #888; font-size: 14px; display:none; }

    @media(max-width:700px) {
      .filter-row { flex-direction: column; }
      .marks-input { width: 60px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-info">
    <h1 id="welcome-text"><img src="logo.svg" alt="" style="width:32px;height:32px;border-radius:50%;vertical-align:middle;margin-right:8px;">🏫 Prabha Gyan Jyoti — Teacher Portal</h1>
    <p id="teacher-info">Loading...</p>
  </div>
  <a href="appearance.html" style="background:#8e44ad;color:#fff;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;">📋 Appearance</a>
  <a href="tabulation.html" style="background:#e67e22;color:#fff;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;text-decoration:none;">📊 Tabulation</a>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">
  <div class="card">
    <h2>Enter Student Marks</h2>
    <div class="info-box" id="teacher-subject-info">Loading your assignment...</div>

    <!-- FILTER ROW -->
    <div class="filter-row">
      <div>
        <label>Session *</label>
        <select id="sel-session">
          <option value="2024-25">2024-25</option>
          <option value="2025-26">2025-26</option>
          <option value="2026-27" selected>2026-27</option>
          <option value="2027-28">2027-28</option>
        </select>
      </div>
      <div>
        <label>Class *</label>
        <select id="sel-class">
          <option value="">-- Select Class --</option>
          <option>II</option><option>III</option><option>IV</option>
          <option>V</option><option>VI</option><option>VII</option><option>VIII</option>
        </select>
      </div>
      <div>
        <label>Section</label>
        <select id="sel-section">
          <option value="">-- No Section --</option>
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
      </div>
      <div>
        <label>Exam *</label>
        <select id="sel-exam">
          <option value="">-- Select Exam --</option>
          <option value="PA1">P.A. 1 (Max: 20)</option>
          <option value="HalfYearly">Half Yearly (Max: 80)</option>
          <option value="PA2">P.A. 2 (Max: 20)</option>
          <option value="Annual">Annual (Max: 80)</option>
        </select>
      </div>
      <div>
        <label>Subject *</label>
        <select id="sel-subject">
          <option value="">-- Select Subject --</option>
          <option>English</option>
          <option>Hindi</option>
          <option>Maths</option>
          <option>Science</option>
          <option>SST</option>
          <option>GK</option>
          <option>Computer</option>
          <option>Sanskrit</option>
          <option>Drawing</option>
        </select>
      </div>
      <div style="padding-top:18px;">
        <button class="btn btn-load" onclick="loadStudents()">🔍 Load Students</button>
      </div>
    </div>

    <div id="marks-msg"></div>
    <div id="loading">Loading students...</div>

    <div id="marks-section" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
        <div id="marks-summary" style="font-size:13px; color:#555;"></div>
        <button class="btn btn-primary" onclick="saveAllMarks()">💾 Save All Marks</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Adm. No</th>
              <th>Student Name</th>
              <th>Father's Name</th>
              <th>Address</th>
              <th id="col-subject">Marks</th>
              <th>Max</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="marks-tbody"></tbody>
        </table>
      </div>
      <div style="margin-top:16px; text-align:right;">
        <button class="btn btn-primary" onclick="saveAllMarks()">💾 Save All Marks</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { collection, getDocs, doc, getDoc, query, where, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const MAX_MARKS = { PA1:20, HalfYearly:80, PA2:20, Annual:80 };
const SUBJECT_ALIASES = {
  'Science/E.V.S.': 'Science',
  'S.S.T.': 'SST',
  'G.K.': 'GK'
};

let currentTeacher = null;
let currentStudents = [];
let existingMarks = {};

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }
  const snap = await getDoc(doc(db, 'users', user.uid));
  if (!snap.exists()) { window.location.href = 'index.html'; return; }
  currentTeacher = snap.data();
  currentTeacher.assignedClasses = currentTeacher.assignedClasses || [];
  currentTeacher.subject = SUBJECT_ALIASES[currentTeacher.subject] || currentTeacher.subject;

  document.getElementById('welcome-text').textContent = `👋 Welcome, ${currentTeacher.name || 'Teacher'}`;
  document.getElementById('teacher-info').textContent = `Subject: ${currentTeacher.subject} | Classes: ${(currentTeacher.assignedClasses||[]).join(', ')}`;
  document.getElementById('teacher-subject-info').innerHTML =
    `You are assigned: <b>${currentTeacher.subject}</b> | Classes: <b>${(currentTeacher.assignedClasses||[]).join(', ')}</b>.<br>
     Select session, class, section, exam and subject then click <b>Load Students</b>.`;

  // Pre-select subject if teacher has one assigned
  const classSelect = document.getElementById('sel-class');
  Array.from(classSelect.options).forEach(option => {
    if (option.value && !currentTeacher.assignedClasses.includes(option.value)) option.remove();
  });

  if (currentTeacher.subject && currentTeacher.subject !== 'All Subjects') {
    const subSel = document.getElementById('sel-subject');
    for (let opt of subSel.options) {
      if (opt.value === currentTeacher.subject) { opt.selected = true; break; }
    }
    subSel.disabled = true;
  }
});

window.logout = () => signOut(auth).then(() => window.location.href = 'index.html');

window.loadStudents = async function() {
  const cls     = document.getElementById('sel-class').value;
  const section = document.getElementById('sel-section').value;
  const exam    = document.getElementById('sel-exam').value;
  const subject = document.getElementById('sel-subject').value;
  const session = document.getElementById('sel-session').value;

  if (!cls || !exam || !subject) {
    showMsg('marks-msg', 'Please select Class, Exam and Subject.', 'error');
    return;
  }
  if (!currentTeacher.assignedClasses.includes(cls)) {
    showMsg('marks-msg', 'You are not assigned to this class.', 'error');
    return;
  }
  if (currentTeacher.subject !== 'All Subjects' && subject !== currentTeacher.subject) {
    showMsg('marks-msg', 'You can only enter marks for your assigned subject.', 'error');
    return;
  }

  document.getElementById('loading').style.display = 'block';
  document.getElementById('marks-section').style.display = 'none';
  document.getElementById('marks-msg').textContent = '';

  try {
    // Build student query — filter by class and session; optionally section
    let q = query(collection(db,'students'), where('class','==',cls), where('session','==',session));
    const stuSnap = await getDocs(q);
    currentStudents = [];
    stuSnap.forEach(d => {
      const data = d.data();
      // Filter by section if selected
      if (!section || data.section === section) {
        currentStudents.push({id:d.id, ...data});
      }
    });
    currentStudents.sort((a,b) => (a.rollNo||0) - (b.rollNo||0));

    if (currentStudents.length === 0) {
      document.getElementById('loading').style.display = 'none';
      showMsg('marks-msg', 'No students found for this class/session. Ask admin to add students.', 'error');
      return;
    }

    // Load existing marks for this combo
    const marksSnap = await getDocs(query(collection(db,'marks'),
      where('class','==',cls), where('exam','==',exam),
      where('subject','==',subject), where('session','==',session)));
    existingMarks = {};
    const currentStudentIds = new Set(currentStudents.map(student => student.id));
    marksSnap.forEach(d => {
      const m = d.data();
      if (!currentStudentIds.has(m.studentId)) return;
      existingMarks[m.studentId] = {
        docId: d.id,
        marks: m.marksObtained,
        notebookMarks: m.notebookMarks,
        remarks: m.remarks || ''
      };
    });

    const max = MAX_MARKS[exam];
    document.getElementById('col-subject').textContent = `${subject} Marks`;

    const tbody = document.getElementById('marks-tbody');
    tbody.innerHTML = currentStudents.map((s, idx) => {
      const existing = existingMarks[s.id];
      const val = existing ? existing.marks : '';
      const isSaved = existing !== undefined;
      return `
        <tr>
          <td>${idx+1}</td>
          <td><b>${s.admissionNo || s.rollNo || '-'}</b></td>
          <td>${escapeHtml(s.name || '-')}</td>
          <td style="color:#555;">${escapeHtml(s.fatherName || '-')}</td>
          <td style="color:#777;font-size:12px;">${escapeHtml(s.address || '-')}</td>
          <td>
            <input type="number" class="marks-input ${isSaved?'saved':''}" id="m_${s.id}"
              value="${val}" min="0" max="${max}"
              onchange="validateInput(this, ${max})"
              placeholder="0-${max}"/>
          </td>
          <td style="text-align:center;">${max}</td>
          <td id="status_${s.id}">
            ${isSaved
              ? '<span style="color:#27ae60;">✅ Saved</span>'
              : '<span style="color:#e67e22;">⏳ Pending</span>'}
          </td>
        </tr>`;
    }).join('');

    const savedCount = Object.keys(existingMarks).length;
    document.getElementById('marks-summary').innerHTML =
      `Class <b>${cls}${section?' - '+section:''}</b> | Exam: <b>${exam}</b> | Subject: <b>${subject}</b> | 
       <span class="status-dot dot-green"></span>${savedCount} saved &nbsp;|&nbsp; 
       <span class="status-dot dot-orange"></span>${currentStudents.length - savedCount} pending`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('marks-section').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    showMsg('marks-msg', 'Error loading students: ' + e.message, 'error');
  }
};

window.validateInput = function(input, max) {
  const val = Number(input.value);
  if (input.value === '') { input.classList.remove('saved','error'); return; }
  if (isNaN(val) || val < 0 || val > max) {
    input.classList.add('error'); input.classList.remove('saved');
  } else {
    input.classList.remove('error'); input.classList.add('saved');
  }
};

window.saveAllMarks = async function() {
  const cls     = document.getElementById('sel-class').value;
  const section = document.getElementById('sel-section').value;
  const exam    = document.getElementById('sel-exam').value;
  const subject = document.getElementById('sel-subject').value;
  const session = document.getElementById('sel-session').value;
  const max     = MAX_MARKS[exam];

  if (!cls || !exam || !subject) {
    showMsg('marks-msg','Please select class, exam and subject first.','error'); return;
  }
  if (!currentTeacher.assignedClasses.includes(cls)) {
    showMsg('marks-msg', 'You are not assigned to this class.', 'error'); return;
  }
  if (currentTeacher.subject !== 'All Subjects' && subject !== currentTeacher.subject) {
    showMsg('marks-msg', 'You can only enter marks for your assigned subject.', 'error'); return;
  }

  let errors = [], saves = [];
  currentStudents.forEach(s => {
    const input = document.getElementById('m_'+s.id);
    if (!input || input.value === '') return;
    const val = Number(input.value);
    if (isNaN(val) || val < 0 || val > max) {
      errors.push(`${s.name}: invalid (${input.value})`);
    } else {
      saves.push({ student: s, marks: val });
    }
  });

  if (errors.length > 0) { showMsg('marks-msg','Fix errors: '+errors.join('; '),'error'); return; }
  if (saves.length === 0) { showMsg('marks-msg','No marks entered yet.','error'); return; }

  try {
    for (const item of saves) {
      const safeSubject = subject.replace(/[^a-zA-Z0-9]/g,'_');
      const safeSession = session.replace('-','_');
      const docId = `${item.student.id}_${exam}_${safeSubject}_${safeSession}`;
      await setDoc(doc(db,'marks',docId), {
        studentId: item.student.id,
        studentName: item.student.name,
        class: cls,
        section: section || '',
        subject,
        exam,
        session,
        marksObtained: item.marks,
        maxMarks: max,
        enteredBy: currentTeacher?.email || '',
        updatedAt: serverTimestamp()
      });
      document.getElementById('status_'+item.student.id).innerHTML = '<span style="color:#27ae60;">✅ Saved</span>';
      document.getElementById('m_'+item.student.id).classList.add('saved');
      existingMarks[item.student.id] = { marks: item.marks };
    }
    const savedCount = Object.keys(existingMarks).length;
    document.getElementById('marks-summary').innerHTML =
      `Class <b>${cls}${section?' - '+section:''}</b> | Exam: <b>${exam}</b> | Subject: <b>${subject}</b> | 
       <span class="status-dot dot-green"></span>${savedCount} saved &nbsp;|&nbsp; 
       <span class="status-dot dot-orange"></span>${currentStudents.length - savedCount} pending`;
    showMsg('marks-msg', `✅ ${saves.length} marks saved successfully!`, 'success');
  } catch(e) {
    showMsg('marks-msg', 'Error saving: '+e.message, 'error');
  }
};

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'msg msg-'+(type==='error'?'error':'success');
  el.textContent = msg;
  if (type === 'success') setTimeout(() => el.textContent = '', 5000);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
  }[char]));
}
</script>
</body>
</html>
