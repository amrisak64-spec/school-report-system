<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <path id="top-arc" d="M 10,60 A 50,50 0 1,1 110,60"/>
    <path id="bot-arc" d="M 22,89 A 42,42 0 0,0 98,89"/>
  </defs>

  <!-- Outer dark-blue ring -->
  <circle cx="60" cy="60" r="59" fill="#1a237e"/>
  <!-- White ring band -->
  <circle cx="60" cy="60" r="53" fill="white"/>
  <!-- Inner border of white band -->
  <circle cx="60" cy="60" r="49" fill="white"/>
  <!-- Inner crimson emblem circle -->
  <circle cx="60" cy="60" r="44" fill="#8b1212"/>

  <!-- Gold dots at 9 o'clock and 3 o'clock -->
  <circle cx="11"  cy="62" r="3.5" fill="#ffd700"/>
  <circle cx="109" cy="62" r="3.5" fill="#ffd700"/>

  <!-- Sun with rays -->
  <g transform="translate(60,27)">
    <line x1="0" y1="-11" x2="0" y2="-14" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="7.8" y1="-7.8" x2="9.9" y2="-9.9" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="11" y1="0" x2="14" y2="0" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="7.8" y1="7.8" x2="9.9" y2="9.9" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="0" y2="14" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-7.8" y1="7.8" x2="-9.9" y2="9.9" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="-14" y2="0" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-7.8" y1="-7.8" x2="-9.9" y2="-9.9" stroke="#ffd700" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#ffd700"/>
  </g>

  <!-- Open book (left page) -->
  <path d="M 37 43 Q 35 40 59 40 L 59 69 Q 35 68 35 65 Z" fill="white" stroke="#333" stroke-width="0.8"/>
  <!-- Open book (right page) -->
  <path d="M 83 43 Q 85 40 61 40 L 61 69 Q 85 68 85 65 Z" fill="white" stroke="#333" stroke-width="0.8"/>
  <!-- Spine -->
  <line x1="60" y1="40" x2="60" y2="69" stroke="#555" stroke-width="1.5"/>
  <!-- Lines on pages -->
  <line x1="40" y1="49" x2="57" y2="49" stroke="#ccc" stroke-width="0.7"/>
  <line x1="40" y1="53" x2="57" y2="53" stroke="#ccc" stroke-width="0.7"/>
  <line x1="40" y1="57" x2="57" y2="57" stroke="#ccc" stroke-width="0.7"/>
  <line x1="40" y1="61" x2="57" y2="61" stroke="#ccc" stroke-width="0.7"/>
  <line x1="63" y1="49" x2="80" y2="49" stroke="#ccc" stroke-width="0.7"/>
  <line x1="63" y1="53" x2="80" y2="53" stroke="#ccc" stroke-width="0.7"/>
  <line x1="63" y1="57" x2="80" y2="57" stroke="#ccc" stroke-width="0.7"/>
  <line x1="63" y1="61" x2="80" y2="61" stroke="#ccc" stroke-width="0.7"/>

  <!-- Hands holding book -->
  <path d="M 28 71 Q 22 77 30 80 Q 40 83 60 74 L 60 69 Q 42 72 34 71 Q 29 71 28 71 Z"
        fill="white" stroke="#444" stroke-width="0.8"/>
  <path d="M 92 71 Q 98 77 90 80 Q 80 83 60 74 L 60 69 Q 78 72 86 71 Q 91 71 92 71 Z"
        fill="white" stroke="#444" stroke-width="0.8"/>

  <!-- School name text (curved around top) -->
  <text font-family="Arial,sans-serif" font-size="7.2" font-weight="bold" fill="#1a237e">
    <textPath href="#top-arc" startOffset="3%">PRABHA GYAN JYOTI PUBLIC SCHOOL</textPath>
  </text>
  <!-- GANGOH text (curved at bottom) -->
  <text font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1a237e" letter-spacing="1.8">
    <textPath href="#bot-arc" startOffset="22%">GANGOH</textPath>
  </text>
</svg>
